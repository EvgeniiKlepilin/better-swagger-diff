name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
            asset_name: bsd-darwin-arm64
          - target: darwin-x64
            os: macos-latest
            asset_name: bsd-darwin-x64
          - target: linux-x64
            os: ubuntu-latest
            asset_name: bsd-linux-x64
          - target: linux-arm64
            os: ubuntu-latest
            asset_name: bsd-linux-arm64
          - target: windows-x64
            os: windows-latest
            asset_name: bsd-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build binary (${{ matrix.target }})
        working-directory: packages/cli
        run: pnpm build:bin:${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: packages/cli/binaries/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: binaries/

      - name: Create checksums
        run: |
          cd binaries
          sha256sum * > sha256sums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/*
          generate_release_notes: true

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump package versions to match tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/core packages/cli packages/npm; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg/package.json', 'utf8'));
              p.version = process.env.VERSION;
              fs.writeFileSync('$pkg/package.json', JSON.stringify(p, null, 2) + '\n');
            " VERSION="$VERSION"
          done
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build
        run: pnpm build

      - name: Publish @better-swagger-diff/core
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @better-swagger-diff/cli
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish better-swagger-diff (npm shim)
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-manifests:
    name: Update Homebrew formula and Scoop manifest
    runs-on: ubuntu-latest
    needs: release

    steps:
      # RELEASE_TOKEN must be a PAT with `contents: write` on this repo.
      # If the repo has branch protection requiring PR reviews, GITHUB_TOKEN
      # cannot push directly to main — use a PAT stored as RELEASE_TOKEN instead.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: binaries/

      - name: Update Homebrew formula SHA256s and version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN_ARM64=$(sha256sum binaries/bsd-darwin-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum binaries/bsd-darwin-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum binaries/bsd-linux-arm64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum binaries/bsd-linux-x64 | awk '{print $1}')

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/better-swagger-diff.rb

          # Replace all sha256 "..." lines in order:
          # darwin-arm64, darwin-x64, linux-arm64, linux-x64 (matches on_arm/on_intel blocks)
          awk -v shas="${SHA_DARWIN_ARM64}|${SHA_DARWIN_X64}|${SHA_LINUX_ARM64}|${SHA_LINUX_X64}" '
            BEGIN { n=1; split(shas, a, "|") }
            /sha256 "[0-9a-f]/ { sub(/sha256 ".*"/, "sha256 \"" a[n] "\""); n++ }
            { print }
          ' Formula/better-swagger-diff.rb > Formula/better-swagger-diff.rb.tmp
          mv Formula/better-swagger-diff.rb.tmp Formula/better-swagger-diff.rb
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Update Scoop manifest version and hash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_WINDOWS_X64=$(sha256sum binaries/bsd-windows-x64.exe | awk '{print $1}')

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('scoop/better-swagger-diff.json', 'utf8'));
            m.version = process.env.VERSION;
            m.architecture['64bit'].url = \`https://github.com/better-swagger-diff/better-swagger-diff/releases/download/v\${process.env.VERSION}/bsd-windows-x64.exe\`;
            m.architecture['64bit'].hash = process.env.SHA_WINDOWS_X64;
            fs.writeFileSync('scoop/better-swagger-diff.json', JSON.stringify(m, null, 2) + '\n');
          " VERSION="$VERSION" SHA_WINDOWS_X64="$SHA_WINDOWS_X64"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit and push updated formula and manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/better-swagger-diff.rb scoop/better-swagger-diff.json
          git diff --staged --quiet || git commit -m "chore: update Homebrew formula and Scoop manifest for ${GITHUB_REF_NAME}"
          git push
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
