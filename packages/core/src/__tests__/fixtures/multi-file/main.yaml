openapi: "3.0.3"
info:
  title: Multi-File API
  description: Tests external $ref resolution across multiple files
  version: "1.0.0"
paths:
  /users:
    get:
      summary: List all users
      operationId: listUsers
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./components.yaml#/components/schemas/User"
    post:
      summary: Create a user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./components.yaml#/components/schemas/User"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "./components.yaml#/components/schemas/User"
  /users/{userId}/address:
    get:
      summary: Get a user's address
      operationId: getUserAddress
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The user's address
          content:
            application/json:
              schema:
                $ref: "./components.yaml#/components/schemas/Address"
