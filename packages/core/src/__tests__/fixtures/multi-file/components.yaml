components:
  schemas:
    User:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        displayName:
          type: string
    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
