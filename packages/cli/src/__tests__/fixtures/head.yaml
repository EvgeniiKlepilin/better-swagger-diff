openapi: "3.0.3"
info:
  title: Pet Store
  version: "2.0.0"
paths:
  /pets:
    get:
      operationId: listPets
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /users:
    post:
      operationId: createUser
      responses:
        "201":
          description: User created
